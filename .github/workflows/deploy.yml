name: Deploy to Production

on:
  push:
    branches:
      - production

defaults:
  run:
    shell: bash

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Notify Discord - Deployment Started
        run: |
          WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK_URL }}"
          if [ -z "$WEBHOOK_URL" ]; then echo "No webhook set, skipping."; exit 0; fi
          COMMIT=$(echo "${{ github.sha }}" | cut -c1-7)
          AUTHOR="${{ github.actor }}"
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"embeds\":[{\"title\":\"Deployment Starting - PSS FleetTools\",\"color\":16776960,\"fields\":[{\"name\":\"Commit\",\"value\":\"$COMMIT\",\"inline\":true},{\"name\":\"Pushed by\",\"value\":\"$AUTHOR\",\"inline\":true},{\"name\":\"Status\",\"value\":\"Stopping bot and preparing workspace...\"}],\"footer\":{\"text\":\"GitHub Actions - Self-hosted Runner\"}}]}"

      - name: Stop bot before checkout
        id: stop_bot
        run: |
          # Stop the systemd service
          sudo /usr/bin/systemctl stop bot-fleettools || true

          # Poll until the service is fully stopped (up to 30 seconds)
          DEADLINE=$((SECONDS + 30))
          while [ $SECONDS -lt $DEADLINE ]; do
            STATUS=$(systemctl is-active bot-fleettools || true)
            if [ "$STATUS" != "active" ]; then
              echo "Service confirmed stopped."
              break
            fi
            echo "Waiting for service to stop..."
            sleep 2
          done
          if [ "$(systemctl is-active bot-fleettools || true)" = "active" ]; then
            echo "ERROR: Service did not stop within 30 seconds."
            exit 1
          fi

          # WAL checkpoint the canonical database
          CANONICAL_DB="/home/botrunner/bots/fleettools/data/fleetwars.db"
          VENV_PYTHON="/home/botrunner/bots/fleettools/venv/bin/python"
          if [ -f "$CANONICAL_DB" ]; then
            "$VENV_PYTHON" -c "import sqlite3; conn = sqlite3.connect('$CANONICAL_DB'); conn.execute('PRAGMA wal_checkpoint(TRUNCATE)'); conn.close()"
            echo "WAL checkpoint completed on canonical database."
          fi

          # Remove any stale database files from the runner workspace
          WORKSPACE_DATA="${{ github.workspace }}/data"
          if [ -d "$WORKSPACE_DATA" ]; then
            find "$WORKSPACE_DATA" -name "fleetwars.db*" -exec rm -f {} \;
            echo "Removed stale database files from workspace."
          fi

      - name: Notify Discord - Stop Bot
        if: always()
        run: |
          WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK_URL }}"
          if [ -z "$WEBHOOK_URL" ]; then exit 0; fi
          OUTCOME="${{ steps.stop_bot.outcome }}"
          COMMIT=$(echo "${{ github.sha }}" | cut -c1-7)
          if [ "$OUTCOME" = "success" ]; then
            TITLE="Step 1/4: Bot Stopped"
            COLOR=3066993
            STATUS="Bot service stopped and database checkpointed successfully."
          else
            TITLE="Step 1/4: Stop Bot Failed"
            COLOR=15158332
            STATUS="Failed to stop bot or checkpoint database. Outcome: $OUTCOME"
          fi
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"embeds\":[{\"title\":\"$TITLE\",\"color\":$COLOR,\"fields\":[{\"name\":\"Commit\",\"value\":\"$COMMIT\",\"inline\":true},{\"name\":\"Status\",\"value\":\"$STATUS\"}],\"footer\":{\"text\":\"GitHub Actions - Self-hosted Runner\"}}]}"

      - name: Checkout latest code
        id: checkout
        uses: actions/checkout@v4
        with:
          ref: production
          clean: false

      - name: Notify Discord - Checkout
        if: always()
        run: |
          WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK_URL }}"
          if [ -z "$WEBHOOK_URL" ]; then exit 0; fi
          OUTCOME="${{ steps.checkout.outcome }}"
          COMMIT=$(echo "${{ github.sha }}" | cut -c1-7)
          if [ "$OUTCOME" = "success" ]; then
            TITLE="Step 2/4: Code Checked Out"
            COLOR=3066993
            STATUS="Latest production code pulled from repository."
          else
            TITLE="Step 2/4: Checkout Failed"
            COLOR=15158332
            STATUS="Failed to checkout latest code. Outcome: $OUTCOME"
          fi
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"embeds\":[{\"title\":\"$TITLE\",\"color\":$COLOR,\"fields\":[{\"name\":\"Commit\",\"value\":\"$COMMIT\",\"inline\":true},{\"name\":\"Status\",\"value\":\"$STATUS\"}],\"footer\":{\"text\":\"GitHub Actions - Self-hosted Runner\"}}]}"

      - name: Copy private credentials
        id: copy_private
        run: |
          PRIVATE_SOURCE="/home/botrunner/bots/fleettools/private"
          PRIVATE_DEST="${{ github.workspace }}/private"

          if [ ! -d "$PRIVATE_SOURCE" ]; then
            echo "ERROR: Private folder not found at $PRIVATE_SOURCE"
            exit 1
          fi

          cp -r "$PRIVATE_SOURCE" "$PRIVATE_DEST"
          echo "Copied private folder to workspace."

      - name: Install dependencies
        id: install_deps
        run: |
          VENV_PYTHON="/home/botrunner/bots/fleettools/venv/bin/python"
          "$VENV_PYTHON" -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            "$VENV_PYTHON" -m pip install -r requirements.txt --quiet
          fi

      - name: Notify Discord - Install Dependencies
        if: always()
        run: |
          WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK_URL }}"
          if [ -z "$WEBHOOK_URL" ]; then exit 0; fi
          COPY_OUTCOME="${{ steps.copy_private.outcome }}"
          DEPS_OUTCOME="${{ steps.install_deps.outcome }}"
          COMMIT=$(echo "${{ github.sha }}" | cut -c1-7)
          if [ "$COPY_OUTCOME" = "success" ] && [ "$DEPS_OUTCOME" = "success" ]; then
            TITLE="Step 3/4: Dependencies Installed"
            COLOR=3066993
            STATUS="Private credentials copied and packages installed successfully."
          else
            TITLE="Step 3/4: Setup Failed"
            COLOR=15158332
            STATUS="Credentials copy: $COPY_OUTCOME | Dependencies: $DEPS_OUTCOME"
          fi
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"embeds\":[{\"title\":\"$TITLE\",\"color\":$COLOR,\"fields\":[{\"name\":\"Commit\",\"value\":\"$COMMIT\",\"inline\":true},{\"name\":\"Status\",\"value\":\"$STATUS\"}],\"footer\":{\"text\":\"GitHub Actions - Self-hosted Runner\"}}]}"

      - name: Start bot
        id: start_bot
        run: |
          # Link the canonical database into the workspace data folder
          WORKSPACE_DATA="${{ github.workspace }}/data"
          CANONICAL_DB="/home/botrunner/bots/fleettools/data/fleetwars.db"
          mkdir -p "$WORKSPACE_DATA"
          ln -sf "$CANONICAL_DB" "$WORKSPACE_DATA/fleetwars.db"
          echo "Symlinked canonical database into workspace."

          # Start the systemd service
          sudo /usr/bin/systemctl start bot-fleettools

          # Wait and verify the service started
          sleep 8
          STATUS=$(systemctl is-active bot-fleettools)
          if [ "$STATUS" != "active" ]; then
            echo "ERROR: Bot service did not start successfully!"
            exit 1
          fi
          echo "Bot service started successfully."

      - name: Notify Discord on success
        if: steps.start_bot.outcome == 'success'
        run: |
          WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK_URL }}"
          if [ -z "$WEBHOOK_URL" ]; then exit 0; fi
          COMMIT=$(echo "${{ github.sha }}" | cut -c1-7)
          AUTHOR="${{ github.actor }}"
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"embeds\":[{\"title\":\"Step 4/4: Bot Started - Deployment Complete\",\"color\":3066993,\"fields\":[{\"name\":\"Commit\",\"value\":\"$COMMIT\",\"inline\":true},{\"name\":\"Pushed by\",\"value\":\"$AUTHOR\",\"inline\":true},{\"name\":\"Status\",\"value\":\"PSS FleetTools restarted with latest production code.\"}],\"footer\":{\"text\":\"GitHub Actions - Self-hosted Runner\"}}]}"

      - name: Notify Discord on failure
        if: steps.start_bot.outcome == 'failure' || steps.start_bot.outcome == 'skipped'
        run: |
          WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK_URL }}"
          if [ -z "$WEBHOOK_URL" ]; then exit 0; fi
          COMMIT=$(echo "${{ github.sha }}" | cut -c1-7)
          AUTHOR="${{ github.actor }}"
          STOP_OUTCOME="${{ steps.stop_bot.outcome }}"
          CHECKOUT_OUTCOME="${{ steps.checkout.outcome }}"
          COPY_OUTCOME="${{ steps.copy_private.outcome }}"
          DEPS_OUTCOME="${{ steps.install_deps.outcome }}"
          START_OUTCOME="${{ steps.start_bot.outcome }}"
          curl -s -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{\"embeds\":[{\"title\":\"Production Deployment Failed - PSS FleetTools\",\"color\":15158332,\"fields\":[{\"name\":\"Commit\",\"value\":\"$COMMIT\",\"inline\":true},{\"name\":\"Pushed by\",\"value\":\"$AUTHOR\",\"inline\":true},{\"name\":\"Stop Bot\",\"value\":\"$STOP_OUTCOME\",\"inline\":true},{\"name\":\"Checkout\",\"value\":\"$CHECKOUT_OUTCOME\",\"inline\":true},{\"name\":\"Copy Credentials\",\"value\":\"$COPY_OUTCOME\",\"inline\":true},{\"name\":\"Install Deps\",\"value\":\"$DEPS_OUTCOME\",\"inline\":true},{\"name\":\"Start Bot\",\"value\":\"$START_OUTCOME\",\"inline\":true}],\"footer\":{\"text\":\"GitHub Actions - Check runner logs for details\"}}]}"